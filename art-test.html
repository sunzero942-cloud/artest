<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>艺术人格测试 - 迪马乔艺术分类系统</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/art-test.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="assets/js/art-questions.js"></script>
    <script src="assets/js/art-scoring.js"></script>
</head>
<body>
    <div class="container test-container">
        <section class="test-header">
            <h1 class="test-title">艺术人格测试</h1>
            <p class="test-subtitle">探索你的艺术品味DNA</p>
        </section>

        <section class="progress-section">
            <div class="progress-info">
                <span class="progress-text" id="progressText">1 / 12</span>
                <span class="dimension-badge" id="dimensionBadge">菜单广度</span>
            </div>
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
        </section>

        <section class="question-section">
            <div class="question-number" id="questionNumber">第 1 题</div>
            <div class="question-text" id="questionText">题目内容</div>
            <div class="option-container">
                <button class="option-btn" id="optionA" onclick="selectOption('A')">
                    选项A
                </button>
                <button class="option-btn" id="optionB" onclick="selectOption('B')">
                    选项B
                </button>
            </div>
        </section>

        <section class="nav-buttons">
            <button class="btn btn-outline" id="prevBtn" onclick="prevQuestion()">上一题</button>
            <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">下一题</button>
            <button class="btn btn-accent" id="submitBtn" onclick="submitTest()" style="display: none;">查看结果</button>
        </section>

        <section class="action-buttons">
            <button class="btn btn-text" onclick="pauseTest()">保存并返回</button>
        </section>
    </div>

    <footer class="footer">
        <div class="footer-content">
            <p class="footer-text">艺术人格测试 &copy; 2026</p>
        </div>
    </footer>

    <script>
        let currentQuestion = 0;
        let answers = {};

        document.addEventListener('DOMContentLoaded', function() {
            loadProgress();
            showQuestion();
            
            window.addEventListener('beforeunload', function(e) {
                if (Object.keys(answers).length > 0 && Object.keys(answers).length < artQuestions.length) {
                    e.preventDefault();
                    e.returnValue = '';
                    return '';
                }
            });
        });

        function loadProgress() {
            const savedProgress = localStorage.getItem('art_test_progress');
            if (savedProgress) {
                const progress = JSON.parse(savedProgress);
                currentQuestion = progress.currentQuestion || 0;
                answers = progress.answers || {};
            }
        }

        function saveProgress() {
            const progress = {
                currentQuestion,
                answers
            };
            localStorage.setItem('art_test_progress', JSON.stringify(progress));
        }

        function showQuestion() {
            if (currentQuestion >= 0 && currentQuestion < artQuestions.length) {
                const question = artQuestions[currentQuestion];
                
                document.getElementById('questionNumber').textContent = `第 ${currentQuestion + 1} 题`;
                document.getElementById('questionText').textContent = question.question;
                document.getElementById('optionA').textContent = question.options[0].text;
                document.getElementById('optionB').textContent = question.options[1].text;
                
                document.getElementById('dimensionBadge').textContent = question.dimensionName;
                
                const progress = ((currentQuestion + 1) / artQuestions.length) * 100;
                document.getElementById('progressBar').style.width = `${progress}%`;
                document.getElementById('progressText').textContent = `${currentQuestion + 1} / ${artQuestions.length}`;
                
                resetOptions();
                if (answers[currentQuestion]) {
                    const selectedOption = answers[currentQuestion];
                    if (selectedOption === 'A') {
                        document.getElementById('optionA').classList.add('selected');
                    } else {
                        document.getElementById('optionB').classList.add('selected');
                    }
                }
                
                document.getElementById('prevBtn').disabled = currentQuestion === 0;
                
                if (currentQuestion === artQuestions.length - 1) {
                    document.getElementById('nextBtn').style.display = 'none';
                    document.getElementById('submitBtn').style.display = 'block';
                } else {
                    document.getElementById('nextBtn').style.display = 'block';
                    document.getElementById('submitBtn').style.display = 'none';
                }
            }
        }

        function resetOptions() {
            document.getElementById('optionA').classList.remove('selected');
            document.getElementById('optionB').classList.remove('selected');
        }

        function selectOption(option) {
            answers[currentQuestion] = option;
            saveProgress();
            showQuestion();
        }

        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                showQuestion();
            }
        }

        function nextQuestion() {
            if (currentQuestion < artQuestions.length - 1) {
                if (!answers[currentQuestion]) {
                    alert('请选择一个选项');
                    return;
                }
                currentQuestion++;
                showQuestion();
            }
        }

        function submitTest() {
            for (let i = 0; i < artQuestions.length; i++) {
                if (!answers[i]) {
                    alert('请回答所有题目');
                    return;
                }
            }
            
            calculateAndSaveResult();
        }

        function calculateAndSaveResult() {
            const result = artScoring.evaluateTest(answers);
            
            localStorage.setItem('art_test_result', JSON.stringify(result));
            localStorage.removeItem('art_test_progress');
            
            window.location.href = 'art-result.html';
        }

        function pauseTest() {
            if (confirm('确定要保存并返回吗？你的进度会被保存。')) {
                saveProgress();
                window.location.href = 'art-index.html';
            }
        }
    </script>
</body>
</html>
